<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký người mới (eKYC)</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; padding-top: 20px; }
        video { border: 4px solid #3498db; border-radius: 10px; width: 640px; height: 480px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .controls { margin-top: 15px; background: #34495e; padding: 25px; border-radius: 10px; display: inline-block; }
        input { padding: 12px; font-size: 16px; border-radius: 5px; border: none; width: 300px; margin-right: 10px; outline: none; }
        .action-btn { padding: 12px 25px; font-size: 16px; cursor: pointer; background: #2ecc71; color: white; border: none; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .action-btn:disabled { background: #7f8c8d; cursor: not-allowed; }
        .action-btn:hover:not(:disabled) { background: #27ae60; }
        #instruction { font-size: 22px; font-weight: bold; margin-top: 15px; color: #f1c40f; min-height: 35px; }
        .progress-bar { display: flex; justify-content: center; gap: 20px; margin-top: 15px; margin-bottom: 20px;}
        .step { padding: 10px 25px; border-radius: 30px; background: #7f8c8d; font-weight: bold; transition: 0.3s; }
        .step.active { background: #f39c12; color: white; box-shadow: 0 0 15px #f39c12; transform: scale(1.1); }
        .step.done { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <h2>THU THẬP KHUÔN MẶT ĐA GÓC</h2>
    <button onclick="window.location.href='index.html'" style="margin-bottom: 10px; cursor: pointer;">⬅️ Quay lại</button>
    
    <div class="progress-bar">
        <div id="step-straight" class="step active">1. Nhìn thẳng</div>
        <div id="step-left" class="step">2. Quay trái</div>
        <div id="step-right" class="step">3. Quay phải</div>
    </div>

    <div><video id="webcam" autoplay playsinline></video></div>
    <div id="instruction">Nhập tên để bắt đầu hệ thống eKYC</div>

    <div class="controls">
        <input type="text" id="userName" placeholder="Nhập họ và tên người dùng...">
        <button class="action-btn" id="startBtn" onclick="startRegistrationFlow()">🚀 Bắt đầu Đăng ký</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const instructionText = document.getElementById('instruction');
        const startBtn = document.getElementById('startBtn');
        const nameInput = document.getElementById('userName');

        const captureCanvas = document.createElement('canvas');
        captureCanvas.width = 640; captureCanvas.height = 480;
        const capCtx = captureCanvas.getContext('2d');

        const poseSteps = ["straight", "left", "right"];
        const poseInstructions = {
            "straight": "Hãy nhìn THẲNG vào camera",
            "left": "Từ từ quay mặt sang TRÁI",
            "right": "Từ từ quay mặt sang PHẢI"
        };
        
        let currentStepIndex = 0;
        let isProcessing = false;
        let collectedEmbeddings = []; 
        let finalGender = ""; // Lưu giới tính do YOLO đoán
        let registrationInterval;

        // Khởi động Camera
        navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
            .then(stream => video.srcObject = stream)
            .catch(e => {
                instructionText.innerText = "Lỗi: Không tìm thấy Camera!";
                instructionText.style.color = "#e74c3c";
            });

        function startRegistrationFlow() {
            const name = nameInput.value.trim();
            if (!name) {
                alert("Vui lòng nhập tên!"); return;
            }
            
            // Reset dữ liệu & UI
            startBtn.disabled = true;
            nameInput.disabled = true;
            currentStepIndex = 0;
            collectedEmbeddings = [];
            finalGender = "";
            
            document.querySelectorAll('.step').forEach(el => el.className = "step");
            
            // Bắt đầu chụp ảnh tự động
            registrationInterval = setInterval(processCurrentStep, 600);
        }

        async function processCurrentStep() {
            if (isProcessing) return;
            isProcessing = true;

            const targetPose = poseSteps[currentStepIndex];
            instructionText.innerText = poseInstructions[targetPose];
            instructionText.style.color = "#f1c40f";

            // Highlight bước hiện tại
            document.querySelectorAll('.step').forEach(el => el.classList.remove("active"));
            document.getElementById(`step-${targetPose}`).classList.add("active");

            // Chụp frame ảnh
            capCtx.drawImage(video, 0, 0, 640, 480);
            const base64Image = captureCanvas.toDataURL('image/jpeg', 0.8);

            const formData = new FormData();
            formData.append("name", nameInput.value.trim());
            formData.append("pose_target", targetPose);
            formData.append("image_base64", base64Image);

            try {
                const response = await fetch('http://127.0.0.1:8000/register_step', { 
                    method: 'POST', 
                    body: formData 
                });
                const data = await response.json();

                if (data.status === "success") {
                    collectedEmbeddings.push(data.embedding);
                    
                    // Lấy giới tính từ YOLO (thường lấy ở bước nhìn thẳng cho chuẩn)
                    if (targetPose === "straight") {
                        finalGender = data.gender;
                    }

                    document.getElementById(`step-${targetPose}`).classList.replace("active", "done");
                    currentStepIndex++;

                    if (currentStepIndex >= poseSteps.length) {
                        await finishRegistration();
                    }
                } else {
                    // Nếu sai góc mặt hoặc YOLO không thấy mặt
                    instructionText.innerText = data.message;
                    instructionText.style.color = "#e74c3c";
                }
            } catch (error) {
                console.error("Lỗi kết nối Server:", error);
                instructionText.innerText = "Không thể kết nối tới Backend!";
            }
            isProcessing = false;
        }

        async function finishRegistration() {
            clearInterval(registrationInterval);
            instructionText.innerText = "⏳ Đang đồng bộ dữ liệu...";
            instructionText.style.color = "#3498db";

            const saveFormData = new FormData();
            saveFormData.append("name", nameInput.value.trim());
            saveFormData.append("gender", finalGender || "Male"); // Mặc định Male nếu lỗi
            saveFormData.append("embeddings_json", JSON.stringify(collectedEmbeddings));

            try {
                const response = await fetch('http://127.0.0.1:8000/save_user', { 
                    method: 'POST', 
                    body: saveFormData 
                });
                const result = await response.json();

                if (result.status === "success") {
                    instructionText.innerText = "🎉 " + result.message;
                    instructionText.style.color = "#2ecc71";
                    alert(`Đã đăng ký thành công: ${nameInput.value} (${finalGender})`);
                } else {
                    alert("Lỗi lưu DB: " + result.message);
                }
            } catch (e) {
                alert("Lỗi kết nối khi lưu dữ liệu!");
            }

            // Mở khóa UI
            startBtn.disabled = false;
            nameInput.disabled = false;
            nameInput.value = "";
        }
    </script>
</body>
</html>
